
{% extends "layout.html" %}
{% block main %}
<!-- Main jumbotron for a primary marketing message or call to action -->
<div class="container">
  <!-- Example row of columns -->
  <div class="row">
    <div class="col-md-12">
      <h2>Upload a file</h2>
      <p>Upload a midi file. It must be a monophonic melody (sorry, no chords).</p>

      <div class="input-group mb-3">
          <form action = "/processing" method = "POST" enctype = "multipart/form-data">
             <div class="input-group">
                <div class="custom-file">
                  <input type="file" name = "file" class="custom-file-input" id="inputGroupFile04" aria-describedby="inputGroupFileAddon04">
                  <label class="custom-file-label" for="inputGroupFile04">Choose file</label>
                </div>
                <div class="input-group-append">
                  <button class="btn btn-primary" type="submit" id="inputGroupFileAddon04">Submit</button>
                </div>
            </div>
          </form>
      </div>
    </div>
  </div>
</div> <!-- /container -->
{% endblock %}

{% block script %}
<script type="application/javascript">
    $('input[type="file"]').change(function(e){
        var fileName = e.target.files[0].name;
        $('.custom-file-label').html(fileName);
    });
</script>
{% endblock %}
